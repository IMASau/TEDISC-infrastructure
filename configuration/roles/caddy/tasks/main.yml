---
- name: Install Caddy
  ansible.builtin.apt:
    name: caddy
    state: "{{ 'latest' if caddy_version == 'latest' else 'present' }}"
    update_cache: true

- name: Ensure Caddy is started and enabled
  ansible.builtin.systemd:
    name: caddy
    state: started
    enabled: true

# If a previous run of this role installed the DNS-01 systemd drop-in (from
# the abandoned caddy-dns/designate approach), remove it now — the current
# design keeps stock apt Caddy and consumes lego's cert files instead.
- name: Remove old DNS-01 systemd drop-in for Caddy (if present)
  ansible.builtin.file:
    path: /etc/systemd/system/caddy.service.d/override.conf
    state: absent
  notify: restart caddy

- name: Remove old openstack env file for Caddy (if present)
  ansible.builtin.file:
    path: /etc/caddy/openstack.env
    state: absent
  notify: restart caddy

- name: Deploy Caddyfile
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: /etc/caddy/Caddyfile
    owner: root
    group: root
    mode: '0644'
  notify: restart caddy
