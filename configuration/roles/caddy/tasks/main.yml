- name: Install Caddy
  apt:
    name: caddy
    state: "{{ 'latest' if caddy_version == 'latest' else 'present' }}"
    update_cache: yes

- name: Ensure Caddy is started and enabled
  systemd:
    name: caddy
    state: started
    enabled: yes

- name: Deploy Caddyfile
  template:
    src: Caddyfile.j2
    dest: /etc/caddy/Caddyfile
    owner: root
    group: root
    mode: '0644'
  notify: restart caddy
