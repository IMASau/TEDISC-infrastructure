---
caddy_version: latest

# Explicit cert/key files served by Caddy. When set, Caddy skips ACME and
# uses these files directly — populated by the lego role from Designate
# DNS-01 challenges. Empty strings put Caddy back on its own ACME.
caddy_cert_file: ""
caddy_key_file: ""

# ACME email — used only when caddy_cert_file/caddy_key_file are empty and
# Caddy is doing its own ACME.
caddy_email: ""
