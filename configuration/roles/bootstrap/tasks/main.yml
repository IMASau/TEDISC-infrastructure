---
# Base packages Ansible itself needs on a minimal Nectar Ubuntu image before
# any other role can safely run. Kept intentionally tiny — actual services
# live in their own roles.

- name: Ensure Ansible prerequisites are installed
  ansible.builtin.apt:
    name:
      # Provides `setfacl` — Ansible needs POSIX ACLs to hand temp files off
      # to unprivileged users when using `become_user`. Without it,
      # `become_user: <non-root>` fails on minimal images.
      - acl
    state: present
    update_cache: true
    cache_valid_time: 3600

# When Ansible first creates /root/.ansible/tmp on its own it uses mode 0700,
# which stops non-root become_user tasks from traversing into per-task
# subdirs. Create it up-front with a traversable mode so ACLs on the leaf
# files (handled by the `acl` package above) are enough.
- name: Pre-create root's Ansible temp dir with traversable permissions
  ansible.builtin.file:
    path: /root/.ansible/tmp
    state: directory
    owner: root
    group: root
    mode: '0755'
