[defaults]
inventory = inventory/production.yml
roles_path = ./roles
lookup_plugins = ./plugins/lookup
host_key_checking = False
retry_files_enabled = False
gathering = smart
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_cache
fact_caching_timeout = 3600

[ssh_connection]
# Fewer round-trips, and — combined with the bootstrap role installing `acl`
# — avoids the temp-file handoff pain when `become_user`-ing to an
# unprivileged user like `dagster`.
pipelining = True
