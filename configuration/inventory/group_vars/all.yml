---
# Caddy ACME email for cert expiry warnings. Optional.
# caddy_email: ops@example.com

# --- Caddy DNS-01 challenge --------------------------------------------------
# Turn this on when Caddy's public IP is firewalled off from the ACME
# validators (e.g. web_ingress_cidrs restricts to a single CIDR). Requires an
# OpenStack application credential with permission to write records in the
# Designate zone. Store its id and secret in Barbican (`openstack secret
# store --name ...`) and reference the two secret names below.
#
# caddy_dns_challenge: true
# caddy_openstack_auth_url: "https://keystone.rc.nectar.org.au/v3/"
# caddy_openstack_region: "Melbourne"
# caddy_appcred_id_secret_name: caddy_appcred_id
# caddy_appcred_secret_secret_name: caddy_appcred_secret

# List of Dagster instances to deploy on the host. Each entry becomes:
#   * a checkout at ~dagster/dagster-instances/<name>/
#   * per-instance systemd units `tedisc@<name>.service` and
#     `tedisc-deploy@<name>.timer`
#   * a Caddy reverse-proxy block for <subdomain> -> localhost:<port>
#
# Fields per entry:
#   name             required, unique short slug (used for compose project,
#                    checkout dir, systemd instance name, container/volume prefix)
#   repo             required, git URL to clone (HTTPS for public repos)
#   branch           optional, defaults to "main"
#   port             required, host-side port the webserver is mapped to
#   subdomain        required, FQDN Caddy serves TLS for
#   env              optional, map of non-secret vars written to .env
#   secrets          optional, map of env-var-name -> Barbican secret name
#                    (fetched at play time via the openstack_secret lookup)
#   user_code_image  optional, overrides the compose-default USER_CODE_IMAGE
#                    tag (e.g. "ghcr.io/owner/tedisc-user-code:v1.2.3" to
#                    pull instead of build)
#   dagster_image    optional, overrides the compose-default DAGSTER_IMAGE
#                    tag used by the webserver and daemon services
#   deploy_mode      optional, "git" (default) or "registry" — how
#                    deploy-update.sh keeps the stack current
#   docker_network   optional, overrides the default network name
#                    (${name}_default); rarely needed
#
# Example:
# dagster_instances:
#   - name: d1
#     repo: https://github.com/eloisewm/TEDISC-Dagster.git
#     port: 3004
#     subdomain: d1.dagster.ore-tedisc.cloud.edu.au
#     env:
#       BLA_FILEPATH: /opt/dagster/app/Datasets/BirdLifeAustralia/bla_output_csiro_290525.csv
#       DB_HOST: testimasag3.its.utas.edu.au
#       DB_PORT: '1433'
#       DB_NAME: IMASOREMonitoring
#       DB_DRIVER: ODBC Driver 18 for SQL Server
#     secrets:
#       DAGSTER_POSTGRES_PASSWORD: d1_dagster_postgres_password
#       DB_USER: d1_db_user
#       DB_PASSWORD: d1_db_password
#       # dagster-authkit session key (generate: `openssl rand -base64 32`)
#       DAGSTER_AUTH_SECRET_KEY: d1_dagster_auth_secret_key
#       # First-boot password for the auto-created `admin` user.
#       DAGSTER_AUTH_ADMIN_PASSWORD: d1_dagster_auth_admin_password
#   - name: d2
#     repo: https://github.com/eloisewm/TEDISC-Dagster.git
#     branch: staging
#     port: 3008
#     subdomain: d2.dagster.ore-tedisc.cloud.edu.au
#     # env / secrets ...

# --- ACME via lego + OpenStack Designate DNS-01 -----------------------------
# Caddy consumes cert files that lego writes to disk. lego renews via a
# daily systemd timer. See configuration/README.md for the one-time
# application credential setup.
lego_email: mark@condense.com.au
lego_domains: ["*.dagster.ore-tedisc.cloud.edu.au"]
lego_openstack_auth_url: "https://keystone.rc.nectar.org.au/v3/"
lego_openstack_region: "Melbourne"
lego_appcred_id_secret_name: caddy_appcred_id
lego_appcred_secret_secret_name: caddy_appcred_secret

# Cert filenames use '_' in place of '*' — this matches lego's wildcard
# encoding. If lego_domains changes, update the stem here.
caddy_cert_file: "/var/lib/lego/certificates/_.dagster.ore-tedisc.cloud.edu.au.crt"
caddy_key_file: "/var/lib/lego/certificates/_.dagster.ore-tedisc.cloud.edu.au.key"

dagster_instances:
  - name: ore
    repo: https://github.com/eloisewm/TEDISC-Dagster.git
    port: 3004
    subdomain: ore.dagster.ore-tedisc.cloud.edu.au
    user_code_image: ghcr.io/eloisewm/tedisc-dagster/user-code:latest
    dagster_image: ghcr.io/eloisewm/tedisc-dagster/dagster:latest
    env:
      BLA_FILEPATH: /opt/dagster/app/Datasets/BirdLifeAustralia/bla_output_csiro_290525.csv
      DB_HOST: testimasag3.its.utas.edu.au
      DB_PORT: '1433'
      DB_NAME: IMASOREMonitoring
      DB_DRIVER: ODBC Driver 18 for SQL Server
    secrets:
      DAGSTER_POSTGRES_PASSWORD: ore_dagster_postgres_password
      DB_USER: ore_db_user
      DB_PASSWORD: ore_db_password
      DAGSTER_AUTH_SECRET_KEY: ore_dagster_auth_secret_key
      DAGSTER_AUTH_ADMIN_PASSWORD: ore_dagster_auth_admin_password
# Later; name: mh or macharbour
